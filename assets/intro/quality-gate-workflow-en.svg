<rect x="112" y="342" width="360" height="260" rx="20" fill="#FFFFFF" stroke="#E1E6EE" stroke-width="1.5"/>
<text x="156" y="382" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="20" fill="#42474F">SKILL.md · References · Agents</text><text x="156" y="440" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="20" fill="#42474F">README · Docs · Examples</text><text x="156" y="510" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="20" fill="#42474F">Git · GitHub · Install · Intro</text>

<path d="M 472 472 C 505 472 512 472 540 472" fill="none" stroke="#5C626B" stroke-width="2" marker-end="url(#arrow)"/>

<rect x="548" y="306" width="548" height="334" rx="26" fill="#FFFFFF" stroke="#E1E6EE" stroke-width="1.5"/>
<rect x="548" y="306" width="548" height="66" rx="26" fill="#0071E3"/>
<rect x="548" y="346" width="548" height="26" fill="#0071E3"/>
<text x="592" y="349" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="15" fill="#FFFFFF" letter-spacing="2.4">QUALITY GATE</text>
<text x="592" y="420" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="22" fill="#101722"><tspan fill="#5C626B">01</tspan><tspan dx="28">Set the goal, grab the 'good Skill' map</tspan></text><text x="592" y="478" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="22" fill="#101722"><tspan fill="#5C626B">02</tspan><tspan dx="28">One check-up: install·token·trap·ship</tspan></text><text x="592" y="536" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="22" fill="#101722"><tspan fill="#5C626B">03</tspan><tspan dx="28">Get the list, ranked by fix-first</tspan></text><text x="592" y="594" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="22" fill="#101722"><tspan fill="#5C626B">04</tspan><tspan dx="28">Fix, pass, paste into PR as proof</tspan></text>

<path d="M 1096 472 C 1130 472 1140 472 1168 472" fill="none" stroke="#5C626B" stroke-width="2" marker-end="url(#arrow)"/>

