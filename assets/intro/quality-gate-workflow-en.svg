<text x="1250" y="404" text-anchor="middle" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="21" fill="#101722">Ship / fix</text><text x="1250" y="457" text-anchor="middle" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="21" fill="#42474F">Fix-first order</text><text x="1250" y="510" text-anchor="middle" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="21" fill="#42474F">Scorecard</text><text x="1250" y="563" text-anchor="middle" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="21" fill="#42474F">Paste to PR</text>

<line x1="112" y1="688" x2="1494" y2="688" stroke="#E1E6EE" stroke-width="1.5"/>
<text x="112" y="738" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="14" fill="#5C626B" letter-spacing="1.6">MATCH   ·   DRIFT   ·   NOT PUSHED   ·   PR OPEN   ·   VISUAL ASSET STALE</text>
<text x="1494" y="790" text-anchor="end" font-family="'Avenir Next','Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="16" fill="#5C626B">Read-only checks find issues; the fix-list comes ranked for you.</text>
