<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">DeepWheel Skill 质量门禁 GitHub 中文介绍</title>
<desc id="desc">你做的 Skill，别人装上能一次跑通吗？只读核验让每个公开面都同步，并给出带证据、可照着改的清单。</desc>

<defs>
