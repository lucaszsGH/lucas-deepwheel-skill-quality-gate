<text x="112" y="224" font-family="'Avenir Next','PingFang SC','Inter',-apple-system,sans-serif" font-weight="700" font-size="14" fill="#5C626B" letter-spacing="2.4">DEEPWHEEL · QUALITY GATE</text>
<text x="112" y="288" font-family="'Avenir Next','PingFang SC','Inter',-apple-system,sans-serif" font-weight="600" font-size="32" fill="#101722" letter-spacing="-.5">Skill 质量门禁</text>
<text x="112" y="360" font-family="'Avenir Next','PingFang SC','Inter',-apple-system,sans-serif" font-weight="600" font-size="46" fill="#101722" letter-spacing="-1"><tspan x="112" dy="0">你做的 Skill，</tspan><tspan x="112" dy="58">别人装上能一次跑通吗？</tspan></text>
<line x1="112" y1="472" x2="358" y2="472" stroke="#E1E6EE" stroke-width="1.5"/>
<text x="112" y="524" font-family="'Avenir Next','PingFang SC','Inter',-apple-system,sans-serif" font-weight="400" font-size="27" fill="#42474F" letter-spacing="-.15"><tspan x="112" dy="0">有把尺子了——从你动手那刻就陪你量起，</tspan><tspan x="112" dy="44">直到它够格公开，再递你一份照着就能改的清单。</tspan></text>
<line x1="112" y1="654" x2="980" y2="654" stroke="#E1E6EE" stroke-width="1.5"/>
<text x="112" y="702" font-family="'Avenir Next','PingFang SC','Inter',-apple-system,sans-serif" font-weight="600" font-size="15" fill="#5C626B" letter-spacing="0.6">给地图   ·   定视角   ·   全体检   ·   出清单</text>
<text x="112" y="756" font-family="'Avenir Next','PingFang SC','Inter',-apple-system,sans-serif" font-weight="400" font-size="16" fill="#5C626B">只读核验，让每个公开面都同步。每条判定带证据，改不改由你决定。</text>

